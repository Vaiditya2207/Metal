name: Visual Fidelity Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  fidelity-visual:
    name: Pixel-by-Pixel Visual Comparison
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install visual test dependencies
        working-directory: tests/fidelity
        run: npm install

      - name: Run Visual Tests
        run: npm run test:visual
