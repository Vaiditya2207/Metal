name: Fidelity Benchmarking

on:
  pull_request:
    branches: [ main, master ]

permissions:
  pull-requests: write
  contents: read

jobs:
  benchmark:
    name: Run Fidelity Benchmarks
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        working-directory: tests/fidelity
        run: npm install

      - name: Run Benchmarks
        working-directory: tests/fidelity
        run: node aggregate_results.js

      - name: Upload Fidelity Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fidelity-results
          path: tests/fidelity/results/

      - name: Comment on PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f tests/fidelity/results/pr_comment.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file tests/fidelity/results/pr_comment.md
          fi
