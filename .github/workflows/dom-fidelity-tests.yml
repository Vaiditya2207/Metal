name: DOM Fidelity Tests

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  fidelity-dom:
    name: Cross-Browser DOM Comparison
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Puppeteer and dependencies
        working-directory: tests/fidelity
        run: npm install

      - name: Run Fidelity DOM Tests
        run: npm run test:fidelity
