<!DOCTYPE html>
<html>
<head>
    <style>
        input {
            font-size: 20px;
            padding: 10px;
            margin: 10px;
            width: 300px;
        }
        .center { text-align: center; }
        .right { text-align: right; }
    </style>
</head>
<body>
    <div><input type="text" value="Left aligned cursor"></div>
    <div><input type="text" value="Centered cursor" class="center"></div>
    <div><input type="text" value="Right aligned cursor" class="right"></div>
    <div><input type="text" value="" placeholder="Empty input cursor"></div>
</body>
</html>
