<!DOCTYPE html><html><head>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: #4285f4;
            margin: 20px;
            display: inline-block;
        }
        .r10 { border-radius: 10px; }
        .r50 { border-radius: 50px; }
        .r-full { border-radius: 50%; }
        .border { border: 5px solid #34a853; }
        .padding { padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box r10"></div>
    <div class="box r50"></div>
    <div class="box r-full"></div>
    <div class="box r10 border"></div>
    <div class="box r10 border padding"></div>


</body></html>
