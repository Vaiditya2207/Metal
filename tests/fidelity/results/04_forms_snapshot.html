<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <title>Fidelity Test 04: Forms</title>
  <style>
    body { margin: 0; padding: 20px; font-family: Helvetica, sans-serif; font-size: 16px; color: #1a1a1a; background: #ffffff; }
    h2 { font-size: 24px; font-weight: 700; margin: 0 0 12px 0; }
    label { display: block; margin-bottom: 4px; font-weight: 700; }
    input[type="text"], input[type="email"], textarea {
      display: block;
      width: 300px;
      padding: 8px;
      margin-bottom: 16px;
      border: 1px solid #aaaaaa;
      font-size: 14px;
      font-family: Helvetica, sans-serif;
    }
    textarea { height: 80px; resize: vertical; }
    button {
      display: inline-block;
      padding: 10px 24px;
      background: #333333;
      color: #ffffff;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
    .form-group { margin-bottom: 8px; }
  </style>
</head>
<body>
  <h2>Form Elements</h2>
  <form>
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Enter your name" value="John Doe">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" placeholder="Write something..."></textarea>
    </div>
    <button type="submit">Submit</button>
  </form>


</body></html>
