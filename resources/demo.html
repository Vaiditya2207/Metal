<!DOCTYPE html>
<html>
<head>
<style>
body {
  background-color: #1a1a2e;
  padding: 20px;
  color: #e0e0e0;
}
h1 {
  color: #e94560;
  margin-bottom: 16px;
}
.card {
  background-color: #16213e;
  padding: 16px;
  margin-bottom: 12px;
}
#click-target {
  background-color: #0f3460;
  color: #ffffff;
  padding: 20px;
}
#timer-output {
  background-color: #1a1a2e;
  padding: 12px;
  color: #53d769;
}
#counter {
  color: #e94560;
}
.accent {
  background-color: #e94560;
  color: #0d1117;
  padding: 12px;
}
</style>
</head>
<body>
  <h1>Metal Browser Engine</h1>
  <div class="card">
    <div id="counter">Count: 0</div>
  </div>
  <div id="click-target">Click me to increment</div>
  <div class="card">
    <div id="timer-output">Waiting for timer...</div>
  </div>
  <div id="app"></div>
  <div class="accent">
    <p>Full pipeline: File to DOM to JavaScript to CSS to Layout to Metal GPU</p>
  </div>
<script>
  var count = 0;
  var counter = document.getElementById('counter');
  var target = document.getElementById('click-target');

  if (target) {
    target.addEventListener('click', function(e) {
      count = count + 1;
      counter.textContent = 'Count: ' + count;
    });
  }

  setTimeout(function() {
    var output = document.getElementById('timer-output');
    if (output) {
      output.textContent = 'Timer fired after 2 seconds!';
    }
  }, 2000);

  var app = document.getElementById('app');
  if (app) {
    var p = document.createElement('p');
    p.textContent = 'Created by JavaScript';
    app.appendChild(p);
  }

  console.log('Demo script loaded successfully');
</script>
</body>
</html>
